name: Build Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 1. Tumhara StarMaker ka code layega
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Asli Hacker Method: Theos ko GitHub ke system se hi nikalega (No Error)
      - name: Checkout Theos Natively
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          submodules: recursive
          path: theos

      # 3. SDKs ko safe tarike se unzip karega
      - name: Install iOS SDK
        run: |
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mv sdks-master/* theos/sdks/
          rm -rf sdks-master sdks.zip

      # 4. Final VIP Bypass Build
      - name: Compile and Package
        run: |
          export THEOS=${{ github.workspace }}/theos
          make package FINALPACKAGE=1

      # 5. File Upload (Jeet ki nishani)
      - name: Upload Tweak File
        uses: actions/upload-artifact@v4
        with:
          name: StarMaker-VIP-Bypass
          path: packages/*.deb
