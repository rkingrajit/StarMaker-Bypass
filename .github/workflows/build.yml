name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Theos
        uses: theos/setup-theos@main
        
      - name: Build Tweak
        run: make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Bypass-DEB
          path: packages/*.deb
          
