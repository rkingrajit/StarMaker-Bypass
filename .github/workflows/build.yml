name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
      - name: Setup iOS SDK (Guru-Fix)
        run: |
          # Agar clone fail hota hai toh ye rasta hamesha chalta hai
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks || (mkdir -p $THEOS/sdks && curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip && unzip -q sdks.zip && mv sdks-master/* $THEOS/sdks/)

      - name: Build Tweak
        run: |
          export THEOS=$THEOS
          cd ${{ github.workspace }}
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-DEB
          path: packages/*.deb
