name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
      - name: Setup iOS SDK (The Fix)
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          # Yahan hum path confirm kar rahe hain taki server bhatke nahi
          ls -R $THEOS/sdks

      - name: Build Tweak
        run: |
          export THEOS=$THEOS
          cd ${{ github.workspace }}
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-DEB
          path: packages/*.deb
