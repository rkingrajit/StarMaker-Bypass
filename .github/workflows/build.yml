name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # Sab kuch naye sire se force install
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
      - name: Fix SDK Location
        run: |
          # SDK ko direct server ke system mein inject karna
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          cp -r sdks-master/* $THEOS/sdks/
          rm -rf sdks-master sdks.zip
          # Path verification
          ls $THEOS/sdks

      - name: Build Tweak (Final Run)
        run: |
          export THEOS=$THEOS
          # Build command ko clean karke chalana
          make clean
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-DEB
          path: packages/*.deb
