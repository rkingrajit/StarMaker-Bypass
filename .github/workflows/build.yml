name: Build Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Tools
        run: brew install ldid xz

      - name: Clean Environment
        run: rm -rf ${{ github.workspace }}/theos

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          
      - name: Setup SDKs (Direct Extract Method)
        run: |
          # Git ka use nahi karenge, seedha tar file download karke extract karenge
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz
          mkdir -p ${{ github.workspace }}/theos/sdks
          mv sdks-master/* ${{ github.workspace }}/theos/sdks/

      - name: Build Final Bypass
        run: |
          export THEOS=${{ github.workspace }}/theos
          make clean
          make package FINALPACKAGE=1
        
      - name: Upload Bypass Package
        uses: actions/upload-artifact@v4
        with:
          name: StarMaker-Working-Bypass
          path: packages/*.deb
